# ──────────────────────────────────────────────────────────────
#  Project: Space Station — Cloudflare Worker Config
#  Serves the static Vite build (HTML + JS + WASM + .dsk assets)
# ──────────────────────────────────────────────────────────────

name = "oregon-trail-apple2"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# The Worker entry point (thin shim — most work is static assets)
main = "worker/index.ts"

# Serve the Vite build output as static assets
[assets]
directory = "dist"
binding    = "ASSETS"

# Observability
[observability]
enabled = true

# ── Optional: custom domain ──────────────────────────────────
# [[routes]]
# pattern     = "spacestation.yourdomain.com"
# custom_domain = true
